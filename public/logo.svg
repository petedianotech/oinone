<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1726" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>

    <!-- Neon Cyan & Purple/Violet Gradient (O) -->
    <linearGradient id="neonO" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" /> <!-- Purple -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>

    <!-- Blue / Cyan Core Gradient for I / 1 -->
    <linearGradient id="coreI" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Hot Gold Accent -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Soft glow filter representing professional Web3/Tech neon -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- PWA Solid Rounded Squared Backdrop for High Visibility -->
  <rect width="512" height="512" rx="128" fill="url(#bgGlow)" />

  <!-- Outer tech boundary ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#neonO)" stroke-width="2" stroke-opacity="0.15" />

  <!-- The "O" Circular Ring (Thick and beautiful) -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#neonO)" stroke-width="24" stroke-linecap="round" filter="url(#neonGlow)" />
  
  <!-- Outer glowing accent rings -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#06b6d4" stroke-width="3" stroke-dasharray="10 15 30 15" stroke-opacity="0.3" />
  <circle cx="256" cy="256" r="115" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="6 12" stroke-opacity="0.25" />

  <!-- Futuristic Corner Markers -->
  <path d="M 64,120 L 64,64 L 120,64" fill="none" stroke="#a855f7" stroke-width="4" stroke-opacity="0.3" stroke-linecap="round" />
  <path d="M 448,120 L 448,64 L 392,64" fill="none" stroke="#06b6d4" stroke-width="4" stroke-opacity="0.3" stroke-linecap="round" />
  <path d="M 64,392 L 64,448 L 120,448" fill="none" stroke="#06b6d4" stroke-width="4" stroke-opacity="0.3" stroke-linecap="round" />
  <path d="M 448,392 L 448,448 L 392,448" fill="none" stroke="#a855f7" stroke-width="4" stroke-opacity="0.3" stroke-linecap="round" />

  <!-- Orbiting Tech Nodes -->
  <circle cx="256" cy="108" r="8" fill="#a855f7" filter="url(#neonGlow)" />
  <circle cx="256" cy="404" r="8" fill="#06b6d4" filter="url(#neonGlow)" />

  <!-- The "1" and "I" nested inside the "O" -->
  <g transform="translate(256, 256)">
    <!-- Glowing background aura for the digit/pilar -->
    <path d="M -8,-65 L 12,-65 L 12,65 L -12,65" stroke="url(#coreI)" stroke-width="8" fill="none" filter="url(#neonGlow)" opacity="0.4" />
    
    <!-- Combined Roman "I" and numeral "1" design -->
    <!-- Vertical stem -->
    <rect x="-10" y="-55" width="20" height="110" rx="3" fill="url(#coreI)" />
    <!-- Serif top bar for 'I' -->
    <rect x="-24" y="-62" width="48" height="10" rx="2" fill="url(#coreI)" />
    <!-- Serif bottom bar for 'I' -->
    <rect x="-28" y="52" width="56" height="12" rx="2" fill="url(#coreI)" />
    <!-- Hook of '1' protruding on the left -->
    <path d="M -10,-55 C -25,-45 -38,-30 -42,-14 L -42,-26 C -32,-38 -20,-48 -10,-55 Z" fill="url(#coreI)" />
    
    <!-- Center glowing diamond nexus -->
    <polygon points="0,-16 12,0 0,16 -12,0" fill="url(#goldGradient)" filter="url(#neonGlow)" />
    <polygon points="0,-8 6,0 0,8 -6,0" fill="#ffffff" />
  </g>
</svg>
