<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for dark mockups or app icon backdrops if nested -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0" />
    </radialGradient>

    <!-- Main Cyan to Indigo Gradient -->
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Warm Golden/Sunset Core Accent for High Value/Vault -->
    <linearGradient id="goldFire" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="40%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>

    <!-- Glass Overlay Reflection -->
    <linearGradient id="glassLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Drop Shadows and Glow Filters for modern vector aesthetics -->
    <filter id="vectorGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Glow Layer -->
  <circle cx="256" cy="256" r="220" fill="url(#bgGlow)" />

  <!-- Outer Cyber Circle Ring (Represents the global tech network "O") -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#cyanPurple)" stroke-width="4" stroke-opacity="0.2" />
  
  <!-- Dashed Segment Overlay for Technical/AI visual language -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#cyanPurple)" stroke-width="6" stroke-dasharray="24 35 120 40 10 20" stroke-linecap="round" />

  <!-- Outer Ring Nodes (Network connections for AI / Nodes in Crypto) -->
  <circle cx="256" cy="76" r="6" fill="#06b6d4" filter="url(#vectorGlow)" />
  <circle cx="362" cy="111" r="4" fill="#6366f1" />
  <circle cx="436" cy="256" r="6" fill="#a855f7" filter="url(#vectorGlow)" />
  <circle cx="256" cy="436" r="6" fill="#06b6d4" />
  <circle cx="76" cy="256" r="5" fill="#6366f1" />

  <!-- Core Elegant Bold Octagram "O-Diamond" Geometric Emblem -->
  <!-- Combining the concept of block-chain node, capital letter O, and diamond wealth/vault -->
  <g transform="translate(256, 256)">
    <!-- Rotating and drawing the polygon wings -->
    <!-- Outer Octagram spikes -->
    <path d="M 0,-130 L 38,-38 L 130,0 L 38,38 L 0,130 L -38,38 L -130,0 L -38,-38 Z" 
          fill="none" 
          stroke="url(#cyanPurple)" 
          stroke-width="10" 
          stroke-linejoin="round" 
          stroke-linecap="round"
          filter="url(#vectorGlow)" />
          
    <path d="M 0,-130 L 38,-38 L 130,0 L 38,38 L 0,130 L -38,38 L -130,0 L -38,-38 Z" 
          fill="url(#cyanPurple)" 
          fill-opacity="0.1" />

    <!-- Core Inner Diamond Coin (The "I" or "Node" of values) -->
    <polygon points="0,-75 55,0 0,75 -55,0" fill="url(#cyanPurple)" />
    
    <!-- Inner Glowing Core of Vault Wealth -->
    <polygon points="0,-45 32,0 0,45 -32,0" fill="url(#goldFire)" />
    
    <!-- Technical laser-grid lines dividing the diamond facet (Representing Tech/Finance Precision) -->
    <line x1="0" y1="-75" x2="0" y2="75" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
    <line x1="-55" y1="0" x2="55" y2="0" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />
    <line x1="-38" y1="-38" x2="38" y2="38" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2 3" />
    <line x1="-38" y1="38" x2="38" y2="-38" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2 3" />

    <!-- Gloss Highlight overlay (Top half of the core diamond) -->
    <path d="M -55,0 C -55,-40 -25,-75 0,-75 C 25,-75 55,-40 55,0 Z" fill="url(#glassLight)" pointer-events="none" />
  </g>

  <!-- Futuristic corner telemetry markers for that ultra-premium, crafted tech vibe -->
  <path d="M 40,80 L 40,40 L 80,40" fill="none" stroke="#06b6d4" stroke-width="3" stroke-opacity="0.4" />
  <path d="M 472,80 L 472,40 L 432,40" fill="none" stroke="#6366f1" stroke-width="3" stroke-opacity="0.4" />
  <path d="M 40,432 L 40,472 L 80,472" fill="none" stroke="#6366f1" stroke-width="3" stroke-opacity="0.4" />
  <path d="M 472,432 L 472,472 L 432,472" fill="none" stroke="#06b6d4" stroke-width="3" stroke-opacity="0.4" />

  <!-- Monogram Letter O inside the core at very high resolution -->
</svg>
